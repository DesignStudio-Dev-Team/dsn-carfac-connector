name: Create DSN Carfac Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v6

      - name: Verify tag matches plugin version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          plugin_version="$(sed -n 's/^[[:space:]]*\* Version:[[:space:]]*//p' dsn-carfac.php | head -n 1)"

          if [[ -z "$plugin_version" || "$plugin_version" != "$tag_version" ]]; then
            echo "Tag version ($tag_version) does not match plugin version ($plugin_version)."
            exit 1
          fi

      - name: Build WordPress-ready ZIP
        id: build
        shell: bash
        run: |
          set -euo pipefail
          plugin_slug="dsn-woo-carfac-connector"
          asset_name="${plugin_slug}-${GITHUB_REF_NAME}.zip"

          rm -rf package "$asset_name"
          mkdir -p "package/$plugin_slug"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='node_modules' \
            --exclude='package' \
            --exclude='*.log' \
            --exclude='product_changes_log.txt' \
            ./ "package/$plugin_slug/"

          (cd package && zip -r "../$asset_name" "$plugin_slug")
          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"

      - name: Verify ZIP layout
        shell: bash
        run: |
          set -euo pipefail
          asset_name="${{ steps.build.outputs.asset_name }}"
          plugin_slug="dsn-woo-carfac-connector"

          unzip -t "$asset_name"
          unzip -Z1 "$asset_name" | grep -qx "$plugin_slug/dsn-carfac.php"

          unexpected="$(unzip -Z1 "$asset_name" | grep -Ev "^${plugin_slug}(/|$)" || true)"
          if [[ -n "$unexpected" ]]; then
            echo "ZIP contains files outside the plugin folder:"
            echo "$unexpected"
            exit 1
          fi

          if unzip -Z1 "$asset_name" | grep -Eq '(^|/)\.git(/|$)|(^|/)\.github(/|$)|\.DS_Store$'; then
            echo "ZIP contains development-only files."
            exit 1
          fi

      - name: Create GitHub Release and upload ZIP
        uses: softprops/action-gh-release@v3
        with:
          name: DSN Carfac ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.build.outputs.asset_name }}
